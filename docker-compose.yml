version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-hospital-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_hospital
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smart-hospital-api
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/smart_hospital?schema=public"
      JWT_SECRET: "change-this-in-production"
      JWT_REFRESH_SECRET: "change-this-refresh-in-production"
      API_PORT: "4000"
      SOCKET_CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: smart-hospital-web
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000/api"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
